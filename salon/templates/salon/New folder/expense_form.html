{% extends "salon/simple_base.html" %}
{% block title %}💸 مصروف جديد - Salon Pro{% endblock %}
{% block page_title %}مصروف جديد{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body p-4">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label fw-bold">التصنيف</label>
                        {{ form.category }}
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">المبلغ (جنية)</label>
                        {{ form.amount }}
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">الوصف</label>
                        {{ form.description }}
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">التاريخ</label>
                        {{ form.date }}
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">إيصال (اختياري)</label>
                        {{ form.receipt }}
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary flex-fill">
                            <i class="fas fa-save me-2"></i> حفظ
                        </button>
                        <a href="/expenses/" class="btn btn-secondary">
                            <i class="fas fa-times me-2"></i> إلغاء
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
