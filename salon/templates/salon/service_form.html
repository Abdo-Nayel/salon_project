{% extends "salon/simple_base.html" %}
{% block title %}تكويد خدمة{% endblock %}
{% block page_title %}تكويد خدمة{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card border-0 shadow-sm">
            <div class="card-header text-white d-flex justify-content-between" style="background:linear-gradient(135deg,#6c5ce7,#a29bfe);">
                <h5 class="mb-0"><i class="fas fa-cut me-2"></i> تكويد خدمة</h5>
                <small>التالي: {{ next_code }}</small>
            </div>
            <div class="card-body p-4">
                <label class="form-label fw-bold small">المسلسل</label>
                <input type="text" id="serviceCode" class="form-control mb-2" placeholder="المسلسل — Enter للتحميل" value="{{ next_code }}" inputmode="numeric">

                <label class="form-label fw-bold small">اسم الخدمة *</label>
                <input type="text" id="serviceName" class="form-control mb-3" placeholder="اسم الخدمة">

                <label class="form-label fw-bold small">السعر *</label>
                <div class="input-group mb-3">
                    <input type="number" id="servicePrice" class="form-control" min="0" step="0.01" placeholder="0.00">
                    <span class="input-group-text">ج</span>
                </div>

                <div class="form-check form-switch mb-3">
                    <input class="form-check-input" type="checkbox" id="serviceActive" checked>
                    <label class="form-check-label fw-bold" for="serviceActive">خدمة نشطة</label>
                </div>

                <div id="serviceInfo" class="alert alert-info py-2 small d-none mb-2"></div>

                <div id="serviceActions" class="d-none d-flex gap-2 mb-3">
                    <button type="button" class="btn btn-danger flex-fill" id="btnDeleteService" onclick="deleteService()">حذف</button>
                    <button type="button" class="btn btn-outline-secondary flex-fill" onclick="newService()">جديد</button>
                </div>

                <button type="button" class="btn w-100 btn-lg text-white" style="background:linear-gradient(135deg,#6c5ce7,#a29bfe);" onclick="saveService()">
                    <i class="fas fa-save me-1"></i> <span id="saveLabel">حفظ الخدمة</span>
                </button>
                <a href="/services/" class="btn btn-outline-secondary w-100 mt-2">رجوع</a>
            </div>
        </div>
    </div>
</div>

<script>
let currentServiceId = null;
let canDeleteService = false;

document.getElementById('serviceCode').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); loadService(); }
});

function loadService() {
    const code = document.getElementById('serviceCode').value.trim();
    if (!code) return;
    fetch(`/services/lookup/?code=${encodeURIComponent(code)}`)
        .then(r => r.json())
        .then(data => {
            if (!data.success) {
                alert(data.error || 'خدمة غير موجودة');
                currentServiceId = null;
                document.getElementById('serviceInfo').classList.add('d-none');
                document.getElementById('serviceActions').classList.add('d-none');
                document.getElementById('saveLabel').textContent = 'حفظ الخدمة';
                return;
            }
            const s = data.service;
            currentServiceId = s.id;
            canDeleteService = s.can_delete;
            document.getElementById('serviceName').value = s.name;
            document.getElementById('servicePrice').value = s.price;
            document.getElementById('serviceActive').checked = s.is_active;
            const info = document.getElementById('serviceInfo');
            info.textContent = s.can_delete
                ? 'خدمة محمّلة — يمكن التعديل أو الحذف'
                : `خدمة محمّلة — تعديل فقط (${s.delete_message})`;
            info.classList.remove('d-none');
            document.getElementById('serviceActions').classList.remove('d-none');
            document.getElementById('btnDeleteService').style.display = s.can_delete ? 'block' : 'none';
            document.getElementById('saveLabel').textContent = 'حفظ التعديلات';
        });
}

function newService() {
    currentServiceId = null;
    document.getElementById('serviceCode').value = '{{ next_code }}';
    document.getElementById('serviceName').value = '';
    document.getElementById('servicePrice').value = '';
    document.getElementById('serviceActive').checked = true;
    document.getElementById('serviceInfo').classList.add('d-none');
    document.getElementById('serviceActions').classList.add('d-none');
    document.getElementById('saveLabel').textContent = 'حفظ الخدمة';
}

function saveService() {
    const name = document.getElementById('serviceName').value.trim();
    const price = document.getElementById('servicePrice').value;
    if (!name) { alert('اسم الخدمة مطلوب'); return; }
    if (!price || parseFloat(price) < 0) { alert('أدخل السعر'); return; }
    const payload = {
        action: 'save',
        name,
        price,
        code: document.getElementById('serviceCode').value.trim(),
        is_active: document.getElementById('serviceActive').checked,
    };
    if (currentServiceId) payload.service_id = currentServiceId;
    fetch('/services/add/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}' },
        body: JSON.stringify(payload),
    }).then(r => r.json()).then(data => {
        if (data.success) {
            alert(data.message);
            document.getElementById('serviceCode').value = data.next_code || '{{ next_code }}';
            newService();
            document.getElementById('serviceCode').value = data.next_code || '{{ next_code }}';
        } else alert(data.error);
    });
}

function deleteService() {
    if (!currentServiceId || !canDeleteService) return;
    if (!confirm('حذف هذه الخدمة؟')) return;
    fetch('/services/add/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}' },
        body: JSON.stringify({ action: 'delete', service_id: currentServiceId }),
    }).then(r => r.json()).then(data => {
        if (data.success) {
            alert(data.message);
            document.getElementById('serviceCode').value = data.next_code || '1';
            newService();
        } else alert(data.error);
    });
}
</script>
{% endblock %}
