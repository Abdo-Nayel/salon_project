<td>
    <div class="btn-group">
        <a href="{% url 'user_edit' user.id %}" class="btn btn-sm btn-warning">
            <i class="fas fa-edit"></i>
        </a>
        <form method="post" action="{% url 'user_delete' user.id %}" class="d-inline" onsubmit="return confirm('هل أنت متأكد من الحذف؟')">
            {% csrf_token %}
            <button type="submit" class="btn btn-sm btn-danger">
                <i class="fas fa-trash"></i>
            </button>
        </form>
    </div>
</td>
