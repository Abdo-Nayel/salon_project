{% extends "salon/simple_base.html" %}
{% block title %}👤 مستخدم جديد - صالون برو{% endblock %}
{% block page_title %}مستخدم جديد{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-white border-0 pt-4 px-4">
                <h5 class="fw-bold">👤 إضافة مستخدم جديد</h5>
            </div>
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">الاسم الأول</label>
                            <input type="text" class="form-control" name="first_name" placeholder="مثال: أحمد" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">الاسم الأخير</label>
                            <input type="text" class="form-control" name="last_name" placeholder="مثال: محمد" required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">اسم المستخدم *</label>
                            <input type="text" class="form-control" name="username" placeholder="مثال: ahmed123" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">البريد الإلكتروني</label>
                            <input type="email" class="form-control" name="email" placeholder="example@email.com">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">كلمة المرور *</label>
                            <input type="password" class="form-control" name="password" placeholder="********" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">تأكيد كلمة المرور *</label>
                            <input type="password" class="form-control" name="confirm_password" placeholder="********" required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">الفرع</label>
                            <select class="form-select" name="branch">
                                <option value="">اختر الفرع</option>
                                {% for branch in branches %}
                                <option value="{{ branch.id }}">{{ branch.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">نوع المستخدم</label>
                            <select class="form-select" name="user_type">
                                <option value="cashier">💳 كاشير</option>
                                <option value="barber">✂️ حلاق</option>
                                <option value="manager">📊 مدير فرع</option>
                                <option value="admin">👑 مدير نظام</option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">الصلاحيات</label>
                        <div class="row">
                            <div class="col-md-3">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" name="can_pos" checked>
                                    <label class="form-check-label">نقطة البيع</label>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" name="can_inventory">
                                    <label class="form-check-label">المخزن</label>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" name="can_expenses">
                                    <label class="form-check-label">المصروفات</label>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" name="can_reports">
                                    <label class="form-check-label">التقارير</label>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" name="can_bookings" checked>
                                    <label class="form-check-label">الحجوزات</label>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" name="can_customers" checked>
                                    <label class="form-check-label">العملاء</label>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" name="can_settings">
                                    <label class="form-check-label">الإعدادات</label>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" name="can_users">
                                    <label class="form-check-label">المستخدمين</label>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" name="is_active" checked>
                            <label class="form-check-label fw-bold">حساب نشط</label>
                        </div>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary flex-fill">
                            <i class="fas fa-save me-2"></i> حفظ المستخدم
                        </button>
                        <a href="/settings/" class="btn btn-secondary">
                            <i class="fas fa-times me-2"></i> إلغاء
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
