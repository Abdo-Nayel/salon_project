{% extends "salon/simple_base.html" %}
{% block title %}🏦 بنك جديد - LyomasTech{% endblock %}
{% block page_title %}بنك جديد{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label fw-bold">اسم البنك</label>
                        <input type="text" class="form-control" name="name" placeholder="مثال: البنك الأهلي" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">رقم الحساب</label>
                        <input type="text" class="form-control" name="account_number" placeholder="مثال: 1234567890">
                    </div>

                    {% if request.user.is_superuser %}
                    <div class="mb-3">
                        <label class="form-label fw-bold">الفرع</label>
                        <select class="form-select" name="branch">
                            <option value="">-- اختر الفرع --</option>
                            {% for branch in branches %}
                            <option value="{{ branch.id }}">{{ branch.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    {% endif %}

                    <div class="mb-3">
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" name="is_active" checked>
                            <label class="form-check-label fw-bold">بنك نشط</label>
                        </div>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary flex-fill">
                            <i class="fas fa-save me-2"></i> حفظ
                        </button>
                        <a href="/settings/" class="btn btn-secondary">
                            <i class="fas fa-times me-2"></i> إلغاء
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
