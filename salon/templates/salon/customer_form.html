{% extends "salon/simple_base.html" %}
{% block title %}👤 عميل جديد - LyomasTech{% endblock %}
{% block page_title %}عميل جديد{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label fw-bold">الاسم</label>
                        {{ form.name }}
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">رقم الهاتف</label>
                        {{ form.phone }}
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">البريد الإلكتروني (اختياري)</label>
                        {{ form.email }}
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">ملاحظات (اختياري)</label>
                        {{ form.notes }}
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary flex-fill">
                            <i class="fas fa-save me-2"></i> حفظ
                        </button>
                        <a href="/customers/" class="btn btn-secondary">
                            <i class="fas fa-times me-2"></i> إلغاء
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
